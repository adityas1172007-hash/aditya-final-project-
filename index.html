<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI IDE - Gemini Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ide-container">
        <div class="activity-bar">
            <div class="icon active" title="Explorer">📁</div>
            <div class="icon" title="Search">🔍</div>
            <div class="icon" title="Settings">⚙️</div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">EXPLORER</div>
            <div class="sidebar-content">
                <div class="file active">📄 main_engine.py</div>
                <div class="file">📄 api_config.json</div>
                <div class="file">📄 requirements.txt</div>
            </div>
        </div>

        <div class="editor-container">
            <div class="tabs">
                <div class="tab active">main_engine.py <span class="close">×</span></div>
            </div>
            
            <div class="chat-area" id="chatContainer">
                <div class="line"><span class="line-num">1</span> <span class="comment"># System Initialized: Google Gemini Pro Engine</span></div>
                <div class="line"><span class="line-num">2</span> <span class="keyword">System Output:</span> Welcome Aditya. Waiting for execution command...</div>
            </div>

            <div class="terminal">
                <div class="terminal-header">TERMINAL - bash</div>
                <div class="input-row">
                    <span class="prompt">aditya@quantum-ai:~$</span>
                    <textarea id="userInput" placeholder="Enter prompt or code... (Shift+Enter for newline)"></textarea>
                    <button id="sendBtn">Execute</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
